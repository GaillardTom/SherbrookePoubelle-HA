name: Validate Brand Assets

on:
  push:
    paths:
      - 'brands/**'
      - '.github/workflows/brands.yml'
  pull_request:
    paths:
      - 'brands/**'
  workflow_dispatch:

jobs:
  validate-brands:
    name: Validate Brand Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Validate PNG brand assets
        run: |
          python tests/test_validation.py

      - name: Check PNG file sizes
        run: |
          echo "Checking brand asset files..."
          for file in brands/*.png; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              echo "  $file: ${size} bytes"
              if [ $size -gt 100000 ]; then
                echo "  ⚠️ Warning: $file is larger than 100KB"
              fi
            fi
          done
          echo ""
          echo "Note: HACS requires icon.png (256x256px) in PNG format"
          echo "See brands/README.md for details"

      - name: Preview brand structure
        run: |
          echo "Brand assets structure:"
          ls -la brands/
          echo ""
          echo "To use with HACS:"
          echo "  - Place icon.png in custom_components/sherbrooke_poubelle/brands/"
          echo "  - Or in the root brands/ directory"
          echo ""
          echo "For Home Assistant Brands repo submission:"
          echo "  1. Fork https://github.com/home-assistant/brands"
          echo "  2. Create: custom_integrations/domotique-sherbrooke/"
          echo "  3. Copy icon.png and other assets"
          echo "  4. Submit PR"
